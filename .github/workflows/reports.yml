name: Daily and Closing Reports

on:
  schedule:
    # Daily report at 09:00 Turkey time (UTC+6)
    - cron: '0 6 * * 1-5'
    # Closing report at 18:00 Turkey time (UTC+15)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-reports:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
    - name: Send Daily Reports
      if: github.event.schedule == '0 6 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python scripts/send_daily_reports.py
        
    - name: Send Closing Reports
      if: github.event.schedule == '0 15 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python scripts/send_closing_reports.py
        
    - name: Commit and push changes
      if: success()
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Update data after reports - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
