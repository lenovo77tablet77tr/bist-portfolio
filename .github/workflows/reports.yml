name: Daily and Closing Reports

on:
  schedule:
    # Daily report at 09:00 Turkey time (UTC+6)
    - cron: '0 6 * * 1-5'
    # Closing report at 18:00 Turkey time (UTC+15)
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  send-reports:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
    - name: Send Daily Reports
      if: github.event.schedule == '0 6 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python -c "
import sys
sys.path.append('src')
from telegram_bot import BistPortfolioBot
from github_sync import GitHubSync

bot = BistPortfolioBot()
github_sync = GitHubSync()

# Send daily reports to all users
for user_id_str in bot.portfolio_manager.portfolio_data.get('users', {}):
    user_id = int(user_id_str)
    user_settings = bot.portfolio_manager.get_user_settings(user_id)
    
    if user_settings['notifications']['daily_report']:
        report = bot.portfolio_manager.generate_detailed_report(user_id)
        
        try:
            import telegram
            application = telegram.ext.Application.builder().token('${{ secrets.TELEGRAM_BOT_TOKEN }}').build()
            await application.bot.send_message(
                chat_id=user_id,
                text=report,
                parse_mode='Markdown'
            )
            print(f'Daily report sent to user {user_id}')
        except Exception as e:
            print(f'Error sending daily report to {user_id}: {e}')

# Sync data
github_sync.sync_data()
"
        
    - name: Send Closing Reports
      if: github.event.schedule == '0 15 * * 1-5'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python -c "
import sys
sys.path.append('src')
from telegram_bot import BistPortfolioBot
from github_sync import GitHubSync

bot = BistPortfolioBot()
github_sync = GitHubSync()

# Send closing reports to all users
for user_id_str in bot.portfolio_manager.portfolio_data.get('users', {}):
    user_id = int(user_id_str)
    user_settings = bot.portfolio_manager.get_user_settings(user_id)
    
    if user_settings['notifications']['closing_report']:
        report = bot.portfolio_manager.generate_closing_report(user_id)
        
        try:
            import telegram
            application = telegram.ext.Application.builder().token('${{ secrets.TELEGRAM_BOT_TOKEN }}').build()
            await application.bot.send_message(
                chat_id=user_id,
                text=report,
                parse_mode='Markdown'
            )
            print(f'Closing report sent to user {user_id}')
        except Exception as e:
            print(f'Error sending closing report to {user_id}: {e}')

# Sync data
github_sync.sync_data()
"
        
    - name: Commit and push changes
      if: success()
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Update data after reports - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
