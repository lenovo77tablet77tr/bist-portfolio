name: Schedule Alarm Checker

on:
  schedule:
    # Run every 5 minutes during market hours (9:30 AM - 6:00 PM Turkey time, UTC+3)
    - cron: '*/5 6-15 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-alarms:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
    - name: Run alarm checker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python scripts/check_alarms.py
        
    - name: Commit and push changes
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Update alarms after check - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
