name: Schedule Alarm Checker

on:
  schedule:
    # Run every 5 minutes during market hours (9:30 AM - 6:00 PM Turkey time, UTC+3)
    - cron: '*/5 6-15 * * 1-5'
  workflow_dispatch:

jobs:
  check-alarms:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
    - name: Run alarm checker
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python -c "
import sys
sys.path.append('src')
from telegram_bot import BistPortfolioBot
from github_sync import GitHubSync

bot = BistPortfolioBot()
github_sync = GitHubSync()

# Check alarms
triggered_alarms = bot.portfolio_manager.check_alarms()

# Send notifications
for alarm_data in triggered_alarms:
    user_id = alarm_data['user_id']
    alarm = alarm_data['alarm']
    
    alarm_text = 'üzerine çıktı' if alarm['type'] == 'above' else 'altına düştü'
    message = (
        f'🔔 **ALARM!**\n\n'
        f'📈 {alarm[\"symbol\"]} hedef fiyata {alarm_text}!\n'
        f'🎯 Hedef Fiyat: {alarm[\"target_price\"]:.2f} TL\n'
        f'💰 Mevcut Fiyat: {alarm[\"triggered_price\"]:.2f} TL'
    )
    
    try:
        import telegram
        application = telegram.ext.Application.builder().token('${{ secrets.TELEGRAM_BOT_TOKEN }}').build()
        await application.bot.send_message(
            chat_id=user_id,
            text=message,
            parse_mode='Markdown'
        )
    except Exception as e:
        print(f'Error sending alarm to {user_id}: {e}')

# Sync data if there were changes
if triggered_alarms:
    github_sync.sync_data()
"
        
    - name: Commit and push changes
      if: success()
      run: |
        git add -A
        git diff --staged --quiet || git commit -m "Update alarms after check - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
