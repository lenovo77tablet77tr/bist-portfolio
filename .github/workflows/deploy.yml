name: Deploy BIST Portfolio Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        echo "Environment variables check:"
        echo "TELEGRAM_BOT_TOKEN: $TELEGRAM_BOT_TOKEN"
        echo "GITHUB_REPO_USERNAME: $GITHUB_REPO_USERNAME"
        echo "GITHUB_REPO_NAME: $GITHUB_REPO_NAME"
        git remote set-url origin https://${{ secrets.GITHUB_REPO_USERNAME }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ secrets.GITHUB_REPO_USERNAME }}/${{ secrets.GITHUB_REPO_NAME }}.git
        
    - name: Run bot
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GITHUB_REPO_USERNAME: ${{ secrets.GITHUB_REPO_USERNAME }}
        GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      run: |
        python main.py
